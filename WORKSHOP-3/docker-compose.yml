services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 20s
      retries: 10

  postgres:
    image: postgres:16
    container_name: ${POSTGRES_CONTAINER:-daniela-postgres}
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-daniela_workshop3}
      POSTGRES_USER: ${POSTGRES_USER:-daniela}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-daniela123}
    volumes:
      - daniela_postgres_data:/var/lib/postgresql/data
      - ./sql/create_tables.sql:/docker-entrypoint-initdb.d/create_tables.sql

  mysql:
    image: mysql:8.0
    container_name: ${MYSQL_CONTAINER:-daniela-mysql}
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-daniela_workshop3}
      MYSQL_USER: ${MYSQL_USER:-daniela}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-daniela123}
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - daniela_mysql_data:/var/lib/mysql
      - ./sql/mysql_create_tables.sql:/docker-entrypoint-initdb.d/01_create_tables.sql

volumes:
  daniela_postgres_data:
  daniela_mysql_data:
